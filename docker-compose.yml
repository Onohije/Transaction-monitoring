services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bankmon}
      POSTGRES_USER: ${POSTGRES_USER:-bankmon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required. Copy .env.example to .env first.}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankmon -d bankmon"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: ./services/api
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required. Copy .env.example to .env first.}
      FAILED_TX_THRESHOLD: ${FAILED_TX_THRESHOLD:-5}
      FAILED_TX_WINDOW_SECONDS: ${FAILED_TX_WINDOW_SECONDS:-300}
      SIM_FAILURE_RATE: ${SIM_FAILURE_RATE:-0.18}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./services/web
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:v2.54.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

volumes:
  postgres_data:
